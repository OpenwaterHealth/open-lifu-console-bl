name: Build firmware using published build image

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration (Debug or Release)'
        required: false
        default: 'Release'
  
  push:
    branches: [ "main", "next" ]
    tags:
      # A single glob is enough: GitHub's tag filter '*' matches any character
      # except '/', so "*.*.*" matches both "1.0.0" and "1.0.0-rc.0". The
      # "Detect release type" step decides release vs pre-release by tag format.
      - "*.*.*"

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git-describe works
          fetch-tags: true       # ensure all tags are present

      # ---------------------------
      # Regenerate the Secure Engine key file (se_key.s)
      # ---------------------------
      # se_key.s embeds the product's AES-128 secret and the ECC public key, so
      # it is .gitignored and produced here at build time from:
      #   - AES-128 key : the SECOREBIN_AES_KEY secret (base64 of the 16 raw bytes)
      #   - ECC pub key : derived from the committed py-tools/keys/ecdsa_public.pem
      # The ECDSA *private* signing key is NOT needed to build the bootloader
      # (it only verifies signatures; signing happens in the application repo).
      # gen_se_key_s.py defaults to the Cortex-M0 (Thumb-1) encoding required by
      # the STM32F072 — MOVW/MOVT do not exist on ARMv6-M.
      - name: Regenerate se_key.s from key material
        env:
          SECOREBIN_AES_KEY: ${{ secrets.SECOREBIN_AES_KEY }}
        run: |
          if [ -z "$SECOREBIN_AES_KEY" ]; then
            echo "::error::SECOREBIN_AES_KEY secret is not set — cannot build SECoreBin." >&2
            exit 1
          fi
          python3 -m pip install --quiet --disable-pip-version-check cryptography
          # AES key (secret) -> raw 16 bytes
          printf '%s' "$SECOREBIN_AES_KEY" | base64 -d > "$RUNNER_TEMP/aes128.bin"
          if [ "$(wc -c < "$RUNNER_TEMP/aes128.bin")" -ne 16 ]; then
            echo "::error::Decoded AES key is not 16 bytes — check the SECOREBIN_AES_KEY secret." >&2
            exit 1
          fi
          # Public key X/Y (32 bytes each) from the committed public PEM
          python3 - "$RUNNER_TEMP" <<'PY'
          import sys
          from cryptography.hazmat.primitives import serialization
          tmp = sys.argv[1]
          pub = serialization.load_pem_public_key(open("py-tools/keys/ecdsa_public.pem", "rb").read())
          n = pub.public_numbers()
          open(f"{tmp}/pub_x.bin", "wb").write(n.x.to_bytes(32, "big"))
          open(f"{tmp}/pub_y.bin", "wb").write(n.y.to_bytes(32, "big"))
          PY
          python3 py-tools/gen_se_key_s.py \
            --cpu cortex-m0 \
            --aes-key   "$RUNNER_TEMP/aes128.bin" \
            --pub-key-x "$RUNNER_TEMP/pub_x.bin" \
            --pub-key-y "$RUNNER_TEMP/pub_y.bin"
          rm -f "$RUNNER_TEMP/aes128.bin"
          test -s SECoreBin/Startup/se_key.s && echo "se_key.s regenerated."

      # ---------------------------
      # Build Firmware
      # ---------------------------
      - name: Pull build image
        run: docker pull ghcr.io/openwaterhealth/stm32-build-env:latest

      - name: Build inside container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            --workdir /workspace \
            ghcr.io/openwaterhealth/stm32-build-env:latest \
            bash -lc "git config --global --add safe.directory /workspace && cmake --preset ${BUILD_TYPE} && cmake --build build/${BUILD_TYPE} --config ${BUILD_TYPE} --target all -j 10"

      # ---------------------------
      # Upload Firmware
      # ---------------------------
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifu-console-bl
          path: |
            build/${{ env.BUILD_TYPE }}/*.hex
            build/${{ env.BUILD_TYPE }}/*.bin

      # ---------------------------
      # Create GitHub Release (tags only)
      # ---------------------------
      # The steps below run ONLY for tag pushes. A plain branch push (main/next)
      # or a workflow_dispatch builds and uploads the firmware artifact above,
      # then skips all release handling — GITHUB_REF_NAME on a branch push is the
      # branch name (e.g. "next"), which is not a valid release tag.
      - name: Detect release type
        id: reltype
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unrecognized tag format: $TAG_NAME" >&2
            exit 1
          fi

      - name: Capture build metadata
        id: buildmeta
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "datetime=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          : > notes.md

          if [[ "${{ steps.reltype.outputs.prerelease }}" == "true" ]]; then
            echo "⚠️ **PRE-RELEASE – NOT FOR PRODUCTION**" >> notes.md
            echo "" >> notes.md
          fi

          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" >> notes.md
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> notes.md
          fi

          echo "" >> notes.md
          echo "---" >> notes.md
          echo "**Build SHA:** \`${{ steps.buildmeta.outputs.sha }}\`" >> notes.md
          echo "**Build Time:** ${{ steps.buildmeta.outputs.datetime }}" >> notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.reltype.outputs.prerelease }}
          allow_updates: ${{ steps.reltype.outputs.prerelease }}
          replace_existing_artifacts: ${{ steps.reltype.outputs.prerelease }}
          name: ${{ github.ref_name }}
          body_path: notes.md
          files: |
            build/${{ env.BUILD_TYPE }}/*.hex
            build/${{ env.BUILD_TYPE }}/*.bin